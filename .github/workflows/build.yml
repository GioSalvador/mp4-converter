name: Build App

on:
  push:
    branches: ["main"]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Prepare FFmpeg
        shell: pwsh
        run: |
          if (!(Test-Path "ffmpeg_bin")) {
            New-Item -ItemType Directory -Path "ffmpeg_bin"
          }

          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "ffmpeg.zip"

          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "."

          $ffmpegPath = Get-ChildItem -Recurse -Filter ffmpeg.exe | Where-Object { $_.FullName -like "*bin*" } | Select-Object -First 1

          Move-Item $ffmpegPath.FullName "ffmpeg_bin/ffmpeg.exe"

      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller --onefile --windowed ^
          --add-binary "ffmpeg_bin/ffmpeg.exe;ffmpeg_bin" ^
          --name mp4-converter script.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mp4-converter-windows
          path: dist/mp4-converter.exe
